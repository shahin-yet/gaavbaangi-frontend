<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaav Baangi Conservation Map</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Main Content -->
  <main class="main-content">
    <!-- Map Section -->
    <section id="map-section" class="content-section active">
      <div class="map-container">
        <div id="map"></div>
        <div class="map-toolbar map-controls">
          <button class="control-btn" id="btn-layer" title="Layer"><i class="fas fa-layer-group"></i></button>
          <button class="control-btn" id="btn-drawing" title="Drawing"><i class="fas fa-pencil-ruler"></i></button>
          <button class="control-btn" id="btn-center" title="Center"><i class="fas fa-crosshairs"></i></button>
        </div>
      </div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
