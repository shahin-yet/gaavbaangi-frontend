<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaav Baangi Conservation Map</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <h1>Gaav Baangi Conservation Map</h1>
  <div id="controls" style="text-align:center; margin-bottom:10px;">
    <button id="draw-refuge-btn">Draw Refuge</button>
    <input type="text" id="refuge-name" placeholder="Refuge Name" style="display:none;" />
    <button id="finish-polygon-btn" style="display:none;">Finish Polygon</button>
  </div>
  <div id="map"></div>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
